<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <title>Inbox close-up (placeholder)</title>
  <desc>Pulled-in view of the monitor showing an email client window. Phase-1 placeholder.</desc>
  <defs>
    <pattern id="scanlines2" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0%" stop-color="#0a0f24"/>
      <stop offset="100%" stop-color="#030410"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#screenGlow)"/>
  <!-- Corner brackets for "targeting" -->
  <g stroke="#46e3ff" stroke-width="3" fill="none" opacity="0.6">
    <path d="M80 80 L80 120 M80 80 L120 80"/>
    <path d="M1520 80 L1520 120 M1520 80 L1480 80"/>
    <path d="M80 820 L80 780 M80 820 L120 820"/>
    <path d="M1520 820 L1520 780 M1520 820 L1480 820"/>
  </g>
  <!-- Monospace status line along the top -->
  <text x="160" y="130" font-family="monospace" font-size="14" fill="#46e3ff" opacity="0.7">
    CONN: secure.uni.edu · LATENCY 12ms · INBOX SCAN: active
  </text>
  <rect width="1600" height="900" fill="url(#scanlines2)"/>
</svg>
