<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <title>Hotspot ring — click indicator</title>
  <desc>Animated cyan ring overlayed on clickable hotspots.</desc>
  <circle cx="40" cy="40" r="36" fill="none" stroke="#46e3ff" stroke-width="2" opacity="0.9">
    <animate attributeName="r" values="32;36;32" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="40" r="22" fill="none" stroke="#46e3ff" stroke-width="1" opacity="0.5"/>
  <circle cx="40" cy="40" r="4" fill="#46e3ff"/>
</svg>
